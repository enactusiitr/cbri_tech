name: zakaaz_shopkeeper
description: Zakaaz Shopkeeper App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.2

  # HTTP client for REST API calls
  http: ^1.2.1

  # Socket.IO client for real-time updates
  socket_io_client: ^2.0.3+1

  # Environment variable / config management
  flutter_dotenv: ^5.1.0

  # Intl for date formatting
  intl: ^0.19.0

  # Logging
  logger: ^2.3.0

  # Google Fonts for better typography
  google_fonts: ^6.2.1

  # Shimmer for loading skeleton effect
  shimmer: ^3.0.0

  # Launch phone dialer (tel:) for reject -> call action
  url_launcher: ^6.3.0

  # Play custom bell sound for new orders
  audioplayers: ^6.1.0

  # Local notifications for new orders (foreground/background)
  flutter_local_notifications: ^17.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  image_path: "icon.png"

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/bell.wav
